{% extends 'core/base.html' %}

    {% block title %}
        پست جدید 
    {% endblock %}
    

    {% block main %}
        <div class="row d-flex justify-between">
            <div class="col-sm-8">
                <form action="{% url 'new_post' %}" method="post">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert alert-danger">
                 {{ form.errors }}
            </div>

            {% endif %}
            {% for field in form %}
             <div>
                 {{ field.label }}
                {{ field }}

             </div>

            {% endfor %}
            <div>
                <input class="btn btn-danger mt-2" type="submit" value="ایجاد">
            </div>


        </form>
            </div>
        </div>

        
        {% endblock %}
